services:
  # Backend API Service
  - type: web
    name: email-classifier-api
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
    healthCheckPath: /api/status
    # Persistent disk for database storage (tokens and analytics)
    disk:
      name: email-classifier-data
      mountPath: /opt/render/project/src
      sizeGB: 1
    
  # Frontend Service
  - type: web
    name: email-classifier-frontend
    env: static
    region: oregon
    plan: free
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://email-classifier-api.onrender.com
